server {
    listen 80;
    server_name imferdian.my.id www.imferdian.my.id;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name imferdian.my.id www.imferdian.my.id;

    ssl_certificate /etc/letsencrypt/live/imferdian.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imferdian.my.id/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}